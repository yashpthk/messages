<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕</title>
<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg,#fffafc,#ffffff);
  font-family: Georgia, serif;
  padding: 24px;
  overflow-x: hidden;
}
.card {
  position: relative;
  max-width: 700px;
  width: 100%;
  background: white;
  border-radius: 24px;
  padding: 36px;
  text-align: center;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  z-index: 1;
}
input {
  padding: 12px;
  width: 100%;
  max-width: 320px;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin-top: 10px;
  font-size: 16px;
}
button {
  font-size: 0.95rem;
  margin-top: 14px;
  padding: 12px 18px;
  border-radius: 999px;
  cursor: pointer;
}
.primaryBtn {
  border: 1px solid #d9c7d0;
  background: transparent;
  color: #8a7280;
}
.primaryBtn:hover {
  background: #fff6fa;
}
.actionBtn {
  display: none;
  margin: 8px auto 0;
  background: #2f2430;
  color: white;
  border: none;
}
.actionBtn:hover {
  opacity: 0.92;
}
#messagePage { display: none; }
#message {
  min-height: 4.8em;
  font-size: 1.8rem;
  line-height: 1.5;
  margin: 24px 0;
  opacity: 0;
  transition: opacity .4s ease;
}
#message.specialMessage {
  color: #5f3b54;
  font-style: italic;
  font-size: 1.65rem;
  letter-spacing: 0.01em;
}
.card.specialCard {
  background: #F68DD5;
  box-shadow: 0 12px 30px rgba(246,141,213,0.22);
}
.card.specialCard #message,
.card.specialCard .small,
.card.specialCard .hint,
.card.specialCard .primaryBtn,
.card.specialCard .lockBtn,
.card.specialCard .refreshBtn {
  color: #5f3b54;
  border-color: rgba(95,59,84,0.25);
}
.card.specialCard .primaryBtn,
.card.specialCard .lockBtn,
.card.specialCard .refreshBtn {
  color: #6b5612;
  border-color: rgba(107, 86, 18, 0.28);
  background: rgba(255, 245, 196, 0.55);
}
.card.specialCard .actionBtn {
  background: #f2cf63;
  color: #5b4710;
  border: none;
}
.card.specialCard .primaryBtn:hover,
.card.specialCard .lockBtn:hover,
.card.specialCard .refreshBtn:hover {
  background: rgba(255, 241, 173, 0.82);
}
.card.specialCard .actionBtn:hover {
  opacity: 1;
  background: #ecc54a;
}
#message.specialMessage::before {
  content: 'Impatience meter full';
  display: block;
  position: absolute;
  top: 14px;
  left: 36px;
  text-align: left;
  font-family: Arial, sans-serif;
  font-size: 0.72rem;
  font-style: normal;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #7a4d68;
  line-height: 34px;
  height: 34px;
  margin-bottom: 0;
}
.small {
  color: #8a7280;
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: .08em;
}
.error { color: crimson; margin-top: 10px; }
.hint { color:#8a7280; margin-top:10px; min-height:48px; }
.lockBtn {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 34px;
  height: 34px;
  padding: 0;
  margin: 0;
  border: 1px solid #d9c7d0;
  background: transparent;
  color: #8a7280;
  border-radius: 999px;
  font-size: 14px;
  line-height: 1;
}
.lockBtn:hover {
  background: #fff6fa;
}
.refreshBtn {
  position: static;
  right: auto;
  bottom: auto;
  width: 34px;
  height: 34px;
  padding: 0;
  margin: 0;
  border: 1px solid #d9c7d0;
  background: transparent;
  color: #8a7280;
  border-radius: 999px;
  font-size: 14px;
  line-height: 1;
  display: none;
}
.refreshBtn:hover {
  background: #fff6fa;
}
.quackBtn {
  background: #2f2430;
  color: white;
  border: none;
}
.quackBtn:hover {
  opacity: 0.92;
}
#validationOverlay,
#charismaOverlay,
#duckOverlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 20;
}
#validationOverlay,
#charismaOverlay {
  background: rgba(255, 250, 252, 0.92);
  padding: 24px;
  text-align: center;
}
#charismaMeter {
  width: min(420px, 80vw);
  height: 16px;
  margin: 24px auto 14px;
  background: #f2e6ec;
  border-radius: 999px;
  overflow: hidden;
  border: 1px solid #ead6df;
}
#charismaFill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #f5b8cf, #2f2430);
  transition: width 1.1s ease;
}
#charismaSub {
  color: #8a7280;
  font-size: 1rem;
  margin-top: 10px;
}
#validationText,
#charismaText {
  max-width: 720px;
  color: #2f2430;
  font-size: clamp(2rem, 5vw, 3.8rem);
  line-height: 1.2;
}
#validationClose,
#charismaClose {
  position: absolute;
  top: 22px;
  right: 22px;
  background: transparent;
  color: #8a7280;
  border: 1px solid #d9c7d0;
}
#duckOverlay {
  pointer-events: none;
  overflow: hidden;
}
.buttonWrap {
  width: fit-content;
  margin: 0 auto;
}
#impatienceMeter {
  width: 100%;
  height: 7px;
  margin: 0 auto 10px;
  background: #f3e8ed;
  border-radius: 999px;
  overflow: hidden;
  border: 1px solid #ead9e1;
}
#impatienceFill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #e6c9d5, #8a7280);
  transition: width 0.28s ease;
}
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 20;
}
#validationOverlay,
#charismaOverlay {
  background: rgba(255, 250, 252, 0.92);
  padding: 24px;
  text-align: center;
}
#validationOverlay {
  background: rgba(255, 250, 252, 0.92);
  padding: 24px;
  text-align: center;
}
#validationText,
#charismaText {
  max-width: 720px;
  color: #2f2430;
  font-size: clamp(2rem, 5vw, 3.8rem);
  line-height: 1.2;
}
#validationClose,
#charismaClose {
  position: absolute;
  top: 22px;
  right: 22px;
  background: transparent;
  color: #8a7280;
  border: 1px solid #d9c7d0;
}
#validationClose {
  position: absolute;
  top: 22px;
  right: 22px;
  background: transparent;
  color: #8a7280;
  border: 1px solid #d9c7d0;
}
#duckOverlay {
  pointer-events: none;
  overflow: hidden;
}
.duck {
  position: absolute;
  font-size: 2rem;
  animation: floatDuck 3.8s linear forwards;
}
@keyframes floatDuck {
  0% { transform: translateY(120vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(-20vh) rotate(18deg); opacity: 0; }
}
</style>
</head>
<body>
<div class="card">
<div id="loginPage">
<div style="font-size:40px;line-height:1;">☕</div>
<div id="hint" class="hint"></div>
<input type="password" id="passwordInput" placeholder="Password">
<br>
<button class="actionBtn" style="display:inline-block;" onclick="checkPassword()">Open</button>
<div class="error" id="error"></div>
</div>
<div id="messagePage">
<p id="message"></p>
<a id="actionLink" href="#" target="_blank" rel="noopener noreferrer" style="text-decoration:none; display:none;">
  <button id="linkActionBtn" class="actionBtn" type="button">Yes</button>
</a>
<button id="actionBtn" class="actionBtn" type="button">Yes</button>

<div id="buttonWrap" class="buttonWrap">
  <div id="impatienceMeter"><div id="impatienceFill"></div></div>
  <button id="nextBtn" class="primaryBtn" onclick="showRandomMessage()">I am impatient</button>
</div>
<button class="lockBtn" onclick="lockPage()">🔒</button>
<button id="refreshBtn" class="refreshBtn" onclick="showRandomMessage()">↻</button>
</div>
</div>

<div id="validationOverlay">
  <button id="validationClose" onclick="closeValidation()">✕</button>
  <div id="validationText"></div>
</div>

<div id="charismaOverlay">
  <button id="charismaClose" onclick="closeCharisma()">✕</button>
  <div id="charismaText"></div>
  <div id="charismaMeter"><div id="charismaFill"></div></div>
  <div id="charismaSub"></div>
</div>

<div id="duckOverlay"></div>

<script>
const charismaLines = [
  "Charisma unlocked.",
  "Dangerously convincing.",
  "Social damage increased.",
  "Compliment magnet detected.",
  "Main character energy confirmed."
];


  
const PASSWORD_HASH = "a3ecbba54d84a5c73c49fc513c02b333b924ed64f79b02e572a38c9ddc1b8651";
const FIRST_UNLOCK_MESSAGE = "You tapped. So now I get to remind you that you’re one of my favorite people.";
const STORAGE_KEY = "messagesUnlocked";
const messages = [
  { text: "A tiny shortcut to a small smile." },
  { text: "You were worth the extra thought." },
  { text: "For the moments between moments." },
  { text: "You make things feel warmer just by being in them." },
  { text: "A little evidence that you cross my mind more than I admit." },
  { text: "You look expensive. The watch is trying to keep up." },
  { text: "For when you need a small smile and I’m not nearby." },
  { text: "I maintain that time looks better on you." },
  { text: "You tapped, which means I win." },
  { text: "Your wrist just got smarter" },
  { text: "Time looks better on you" },
  { text: "Every second suits you" },
  { text: "Wear this and think of me sometimes" },
  { text: "This watch now owns you" },
  { text: "Loading… responsible adult mode" },
  { text: "Proof that I think of you<3" },
  { text: "Your wrist looks expensive now" },
  { text: "Time has excellent taste" },
  { text: "You wear attention very well" },
  { text: "Some things deserve more time" },
  { text: "Small object, unreasonable meaning" },
  { text: "Now accepting compliments" },
  { text: "This watch is emotionally attached to you" },
  { text: "Luxury item detected" },
  { text: "Smart watch. Smarter owner." },
  { text: "Coffee at Harry's?", actionLabel: "Is that even a question?", actionUrl: "https://wa.me/?text=Coffee%20at%20Harry's%3F%20%E2%98%95" },
  { text: "Coffee at _______?", actionLabel: "Yes", actionUrl: "https://wa.me/?text=Coffee%20at%20_______%3F%20%E2%98%95" },
  { text: "Quack for a tiny surprise", actionLabel: "Quack", actionType: "quack" },
  { text: "A walk through the park?", actionLabel: "Okay", actionUrl: "https://wa.me/?text=Walk%20later%3F%20%E2%9C%A8" },
  { text: "Dessert mission?", actionLabel: "Obviously", actionUrl: "https://wa.me/?text=Dessert%20mission%3F%20%F0%9F%8D%B0" },
  { text: "A tiny shortcut to me", actionLabel: "Open", actionUrl: "https://wa.me/?text=Hi%20you.%20You%20were%20apparently%20the%20tiny%20shortcut%20I%20was%20meant%20to%20use.%20%E2%98%95" },
  { text: "In case of emergency: tap", actionLabel: "Open", actionUrl: "https://wa.me/?text=Emergency%20declared.%20This%20tap%20has%20led%20directly%20to%20you.%20%E2%98%95" },
];
const impatienceMessages = [
  { text: "Miss me enough for coffee?", actionLabel: "Absolutely", actionUrl: "https://wa.me/?text=Miss%20you%20enough%20for%20coffee%20%E2%98%95", style: "special"  },
  { text: "Brunch this week?", actionLabel: "That sounds like a good idea", actionUrl: "https://wa.me/?text=Brunch%20this%20week%3F%20sounds%20like%20a%20good%20idea.%20%E2%98%95", style: "special" },
  { text: "Impatience can be charming on you. Tap to receive dramatic validation", actionLabel: "Receive", actionType: "validation", style: "special" },
  { text: "You rushed ahead and somehow unlocked more charisma.", actionLabel: "Unlock", actionType: "charisma", style: "special" },
];

const dramaticLines = [
  "You are, in fact, absurdly easy to adore.",
  "This is your official notice that you look wonderful.",
  "You continue to be a deeply unfair combination of charm and trouble.",
  "There are prettier things in the world, but very few with your timing.",
  "You have the rare gift of making objects look like they were waiting for you.",
  "Congratulations. You remain entirely worth the attention."
];
let remaining = [...messages];
let failedAttempts = 0;
let impatienceCount = 0;
const impatienceThreshold = 8;

async function sha256(text) {
 const data = new TextEncoder().encode(text);
 const hashBuffer = await crypto.subtle.digest('SHA-256', data);
 const hashArray = Array.from(new Uint8Array(hashBuffer));
 return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkPassword() {
 try {
   const entered = document.getElementById('passwordInput').value.trim();
   const enteredHash = await sha256(entered.toLowerCase());

   if (enteredHash === PASSWORD_HASH.toLowerCase()) {
     failedAttempts = 0;
     localStorage.setItem(STORAGE_KEY, 'true');
     document.getElementById('error').textContent = '';
     document.getElementById('hint').innerHTML = '';
     document.getElementById('passwordInput').value = '';
     document.getElementById('loginPage').style.display='none';
     document.getElementById('messagePage').style.display='block';
     showMessage(FIRST_UNLOCK_MESSAGE);
   } else {
     failedAttempts++;
     document.getElementById('error').textContent='';
     document.getElementById('hint').textContent='Not quite. Try something we would go.';
     if (failedAttempts >= 2) {
       document.getElementById('hint').innerHTML='<div>Think of a café.</div>';
     }
     if (failedAttempts >= 3) {
       document.getElementById('hint').innerHTML='<div>Its not complicated.</div>';
     }
     if (failedAttempts >= 4) {
       document.getElementById('hint').innerHTML='<div>You are definitely overthinking this.</div>';
     }
     if (failedAttempts >= 5) {
       document.getElementById('hint').innerHTML='<div>I am running out of hints.</div>';
     }
     if (failedAttempts >= 6) {
       document.getElementById('hint').innerHTML='<div>How have you not guessed it yet!</div>';
     }
     if (failedAttempts >= 7) {
       document.getElementById('hint').innerHTML='<div>Think of a café nearby.</div>';
     }
     if (failedAttempts >= 8) {
       document.getElementById('hint').innerHTML='<div>T_R_B_</div>';
     }
   }
 } catch (e) {
   document.getElementById('error').textContent='This page needs to be opened from a secure site like GitHub Pages, not as a local file.';
 }
}

function updateImpatienceMeter() {
 const fill = document.getElementById('impatienceFill');
 const percentage = (impatienceCount / impatienceThreshold) * 100;
 fill.style.width = Math.min(percentage, 100) + '%';
}

function showSpecialImpatienceMessage() {
 const message = impatienceMessages[Math.floor(Math.random() * impatienceMessages.length)];
 if (typeof message === 'string') {
   showMessage({ text: message, style: 'special' });
   return;
 }
 showMessage({ ...message, style: message.style || 'special' });
}

function showMessage(messageData) {
 const el = document.getElementById('message');
 const actionBtn = document.getElementById('actionBtn');
 const linkActionBtn = document.getElementById('linkActionBtn');
 const actionLink = document.getElementById('actionLink');
 const nextBtn = document.getElementById('nextBtn');
 const buttonWrap = document.getElementById('buttonWrap');
 const refreshBtn = document.getElementById('refreshBtn');
 const isObjectMessage = typeof messageData === 'object' && messageData !== null;
 const text = typeof messageData === 'string' ? messageData : messageData.text;

 actionBtn.style.display = 'none';
 actionBtn.onclick = null;
 linkActionBtn.style.display = 'none';
 actionLink.style.display = 'none';
 actionLink.href = '#';
 nextBtn.style.display = 'inline-block';
 nextBtn.textContent = 'I am impatient';
 nextBtn.className = 'primaryBtn';
 nextBtn.onclick = showRandomMessage;
 buttonWrap.style.display = 'block';
 refreshBtn.style.display = 'none';

 el.style.opacity = 0;
 el.classList.remove('specialMessage');
 document.querySelector('.card').classList.remove('specialCard');
 setTimeout(() => {
   el.textContent = text;
   if (isObjectMessage && messageData.style === 'special') {
     el.classList.add('specialMessage');
     document.querySelector('.card').classList.add('specialCard');
   }
   el.style.opacity = 1;

   if (typeof messageData === 'object' && messageData.actionLabel) {
     nextBtn.style.display = 'none';
     buttonWrap.style.display = 'none';
     refreshBtn.style.display = 'inline-block';
     refreshBtn.style.marginLeft = '8px';
     if (messageData.actionType === 'quack') {
       actionBtn.textContent = messageData.actionLabel;
       actionBtn.style.display = 'inline-block';
       actionBtn.onclick = quackForAnotherOne;
     } else if (messageData.actionType === 'charisma') {
       actionBtn.textContent = messageData.actionLabel;
       actionBtn.style.display = 'inline-block';
       actionBtn.onclick = showCharismaUnlock;
     } else if (messageData.actionType === 'validation') {
       actionBtn.textContent = messageData.actionLabel;
       actionBtn.style.display = 'inline-block';
       actionBtn.onclick = showDramaticValidation;
     } else if (messageData.actionUrl) {
       linkActionBtn.textContent = messageData.actionLabel;
       linkActionBtn.style.display = 'inline-block';
       actionLink.href = messageData.actionUrl;
       actionLink.style.display = 'inline-block';
     }
   }
 }, 120);
}

function showRandomMessage() {
 impatienceCount++;
 if (impatienceCount >= impatienceThreshold) {
   impatienceCount = 0;
   updateImpatienceMeter();
   showSpecialImpatienceMessage();
   return;
 }

 updateImpatienceMeter();
 if (remaining.length===0) remaining=[...messages];
 const i=Math.floor(Math.random()*remaining.length);
 const msg = remaining.splice(i,1)[0];
 showMessage(msg);
}

function showDramaticValidation() {
 const overlay = document.getElementById('validationOverlay');
 const text = document.getElementById('validationText');
 const line = dramaticLines[Math.floor(Math.random() * dramaticLines.length)];
 text.textContent = line;
 overlay.style.display = 'flex';
}

function closeValidation() {
 document.getElementById('validationOverlay').style.display = 'none';
}

function showCharismaUnlock() {
 // keep current message visible, but advance the deck so the next refresh gives a fresh card
 if (remaining.length===0) remaining=[...messages];
 const overlay = document.getElementById('charismaOverlay');
 const text = document.getElementById('charismaText');
 const fill = document.getElementById('charismaFill');
 const sub = document.getElementById('charismaSub');
 const line = charismaLines[Math.floor(Math.random() * charismaLines.length)];
 const percent = 92 + Math.floor(Math.random() * 9);

 text.textContent = line;
 sub.textContent = 'Charisma level: ' + percent + '%';
 overlay.style.display = 'flex';
 fill.style.width = '0%';
 setTimeout(() => {
   fill.style.width = percent + '%';
 }, 60);
}

function closeCharisma() {
 document.getElementById('charismaOverlay').style.display = 'none';
}

function quackForAnotherOne() {
 fillScreenWithDucks();
}

function fillScreenWithDucks() {
 const overlay = document.getElementById('duckOverlay');
 overlay.style.display = 'block';
 overlay.innerHTML = '';

 for (let i = 0; i < 26; i++) {
   const duck = document.createElement('div');
   duck.className = 'duck';
   duck.textContent = '🦆';
   duck.style.left = Math.random() * 100 + 'vw';
   duck.style.animationDelay = (Math.random() * 0.8) + 's';
   duck.style.fontSize = (1.6 + Math.random() * 2.8) + 'rem';
   overlay.appendChild(duck);
 }

 setTimeout(() => {
   overlay.style.display = 'none';
   overlay.innerHTML = '';
 }, 4200);
}

function lockPage() {
 impatienceCount = 0;
 updateImpatienceMeter();
 document.getElementById('buttonWrap').style.display = 'block';
 document.getElementById('refreshBtn').style.display = 'none';
 localStorage.removeItem(STORAGE_KEY);
 failedAttempts = 0;
 document.getElementById('hint').innerHTML = '';
 document.getElementById('error').textContent = '';
 document.getElementById('passwordInput').value = '';
 document.getElementById('messagePage').style.display='none';
 document.getElementById('loginPage').style.display='block';
 document.getElementById('passwordInput').focus();
}

document.getElementById('passwordInput').addEventListener('keydown', function(e){ if(e.key==='Enter') checkPassword();});
window.addEventListener('load', () => {
 const unlocked = localStorage.getItem(STORAGE_KEY) === 'true';
 if (unlocked) {
   document.getElementById('loginPage').style.display='none';
   document.getElementById('messagePage').style.display='block';
   updateImpatienceMeter();
   showRandomMessage();
 } else {
   updateImpatienceMeter();
   document.getElementById('passwordInput').focus();
 }
});
</script>
</body>
</html>
