<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕</title>
        <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="card" id="mainCard">
        <div id="loginPage">
            <div style="font-size:40px;line-height:1;">☕</div>
            <div id="hint" class="hint"></div>
            <input type="password" id="passwordInput" placeholder="Password">
            <br>
            <button class="actionBtn" style="display:inline-block;" type="button"
                onclick="checkPassword()">Open</button>
            <div class="error" id="error"></div>
        </div>

        <div id="messagePage">
            <p id="message"></p>

            <a id="actionLink" href="#" target="_blank" rel="noopener noreferrer"
                style="text-decoration:none; display:none;">
                <button id="linkActionBtn" class="actionBtn" type="button">Yes</button>
            </a>
            <button id="actionBtn" class="actionBtn" type="button">Yes</button>
            <button id="refreshBtn" class="refreshBtn" type="button" onclick="showRandomMessage()">↻</button>

            <div id="buttonWrap" class="buttonWrap">
                <div id="impatienceMeter">
                    <div id="impatienceFill"></div>
                </div>
                <button id="nextBtn" class="primaryBtn" type="button" onclick="showRandomMessage()">I am
                    impatient</button>
            </div>

            <button class="lockBtn" type="button" onclick="lockPage()">🔒</button>
        </div>
    </div>

    <div id="validationOverlay">
        <button id="validationClose" type="button" onclick="closeValidation()">✕</button>
        <div id="validationText"></div>
    </div>

    <div id="charismaOverlay">
        <button id="charismaClose" type="button" onclick="closeCharisma()">✕</button>
        <div id="charismaText"></div>
        <div id="charismaMeter">
            <div id="charismaFill"></div>
        </div>
        <div id="charismaSub"></div>
    </div>

    <div id="fortuneOverlay">
        <button id="fortuneClose" type="button" onclick="closeFortune()">✕</button>
        <div id="fortuneText"></div>
    </div>

    <div id="chaosOverlay">
        <button id="chaosClose" type="button" onclick="closeChaos()">✕</button>
        <div>
            <div id="chaosText"></div>
            <div id="chaosSub"></div>
        </div>
    </div>

    <div id="duckOverlay"></div>

        <script src="script.js"></script>
</body>

</html>
