<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ History</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            align-items: flex-start;
            padding-top: 48px;
        }

        .history-container .card {
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .history-container .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
        }
    </style>
</head>

<body>
    <div class="history-page-wrapper">
        <div class="search-container" style="align-items: center;">
            <button id="toggleHintBtn" class="resetBtn" type="button">?</button>
            <input type="text" id="searchInput" style="font-size: small;" placeholder="Search found history...">
            <span id="historyStats"
                style="margin-left: auto; color: #8a7280; font-size: 0.9rem; white-space: nowrap; display: flex; flex-direction: column; text-align: right; line-height: 1.4;"></span>
            <button id="resetHistoryBtn" class="resetBtn" type="button">&#8634;</button>
        </div>
        <div class="hint-container" id="hintContainer"
            style="text-align: center; margin: 16px 0; color: #b09ba7; font-style: italic; font-size: 0.95rem; padding: 0 16px; display: none; flex-direction: column; align-items: center; gap: 8px;">
            <span id="rareHintText">Want to know how to unlock all rare cards?</span>
            <button id="nextHintBtn" type="button"
                style="padding: 6px 12px; background: transparent; border: 1px solid rgba(176, 155, 167, 0.5); color: #b09ba7; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: background 0.2s, border-color 0.2s;">Show
                Hint</button>
        </div>
        <div class="history-container" id="historyGrid">
            <!-- Cards will be dynamically inserted here -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('historyGrid');
            let historyData = [];

            try {
                const storedHistory = localStorage.getItem('cardHistory');
                if (storedHistory) {
                    historyData = JSON.parse(storedHistory);
                }
            } catch (e) {
                console.error('Failed to load history', e);
            }

            const totalCards = localStorage.getItem('totalCards') || '?';
            const totalRareCards = localStorage.getItem('totalRareCards') || '?';

            const foundRare = historyData.filter(item => typeof item === 'object' && item !== null && item.style === 'rare').length;

            const statsSpan = document.getElementById('historyStats');
            statsSpan.innerHTML = `
                <span>Cards: ${historyData.length} of ${totalCards}</span>
                <span>Rare: ${foundRare} of ${totalRareCards}</span>
            `;

            if (historyData.length === 0) {
                grid.innerHTML = '<p style="color: #8a7280; text-align: center; grid-column: 1 / -1;">No history yet. Start exploring!</p>';
                return;
            }

            historyData.forEach(item => {
                const isObjectMessage = typeof item === 'object' && item !== null;
                const text = isObjectMessage ? item.text : item;

                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.dataset.text = text.toLowerCase();

                const msgP = document.createElement('p');
                msgP.className = 'message';
                msgP.textContent = text;

                if (isObjectMessage) {
                    if (item.style === 'special') {
                        cardDiv.classList.add('specialCard');
                        msgP.classList.add('specialMessage');
                    } else if (item.style === 'rare') {
                        cardDiv.classList.add('rareCard');
                        msgP.classList.add('rareMessage');
                    } else if (item.style === 'celebratory') {
                        cardDiv.classList.add('celebratoryCard');
                        msgP.classList.add('celebratoryMessage');
                    } else if (item.style === 'intro') {
                        cardDiv.classList.add('introCard');
                    }

                    if (item.actionType === 'validation') cardDiv.classList.add('validationCard');
                    else if (item.actionType === 'charisma') cardDiv.classList.add('charismaCard');
                    else if (item.actionType === 'chaos') cardDiv.classList.add('chaosCard');
                    else if (item.actionType === 'podcast') cardDiv.classList.add('podcastCard');
                }

                cardDiv.onclick = () => {
                    localStorage.setItem('selectedHistoryCard', JSON.stringify(item));
                    window.location.href = 'index.html';
                };

                cardDiv.appendChild(msgP);
                grid.appendChild(cardDiv);
            });

            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const cards = grid.querySelectorAll('.card');
                cards.forEach(card => {
                    if (card.dataset.text.includes(query)) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });

            const resetBtn = document.getElementById('resetHistoryBtn');
            if (resetBtn) {
                resetBtn.addEventListener('click', () => {
                    if (confirm('This will reset all your saved data! You sure you wanna do this?')) {
                        localStorage.clear();
                        window.location.href = 'index.html';
                    }
                });
            }

            const hints = [
                "Rare cards rely on your impatience.",
                "Notice how many cards you've seen?",
                "Rare cards are tied to the exact number of cards you've drawn in total.",
                "The more you draw, the closer you get to the rarest messages.",
                "If a rare card has an ID of 10, it will only show up as your 10th draw!",
                "Every reroll counts.",
                "Don't stop now, some secrets only reveal themselves when the timing is exactly right.",
                "Looking at history will decrease your chance of finding different rare cards."
            ];
            let currentHintIndex = -1;
            const hintBtn = document.getElementById('nextHintBtn');
            hintBtn.addEventListener('click', () => {
                currentHintIndex = (currentHintIndex + 1) % hints.length;
                document.getElementById('rareHintText').textContent = `💡 Hint: ${hints[currentHintIndex]}`;
                hintBtn.textContent = 'Next Hint';
            });

            const toggleHintBtn = document.getElementById('toggleHintBtn');
            const hintContainer = document.getElementById('hintContainer');
            toggleHintBtn.addEventListener('click', () => {
                if (hintContainer.style.display === 'none') {
                    hintContainer.style.display = 'flex';
                } else {
                    hintContainer.style.display = 'none';
                }
            });
        });
    </script>
</body>

</html>
